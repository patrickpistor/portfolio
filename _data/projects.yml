# ─────────────────────────────────────────────
# PROJECTS
# ─────────────────────────────────────────────
# Each project appears as a card on the home page.
# The first entry is always rendered as the full-width hero card.
# All subsequent entries fill the responsive grid below it.
#
# Fields:
#   title       — project name
#   category    — short tag shown on the card (e.g. "Brand Identity", "Web App")
#   description — 1–2 sentence summary shown on the card
#   cover       — path to cover image (relative to site root, or a full URL)
#               — leave blank to show an icon card instead
#   icon        — Lucide icon name for cards without a cover image
#               — browse icons at lucide.dev (use the kebab-case name, e.g. "type", "code-2", "layers")
#   url         — where clicking the card goes (internal page or external link)
#   year        — displayed in project metadata

