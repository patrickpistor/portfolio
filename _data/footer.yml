# ─────────────────────────────────────────────
# FOOTER CONFIGURATION
# ─────────────────────────────────────────────
# NOTE: The current footer.html only renders copyright text and social icons
# from site.social_links in _config.yml. The columns and newsletter fields
# below are not yet wired up and are here for a future enhancement.
#
# Add, remove, or reorder columns freely.
# Each column has a heading and a list of links.
# Remove a column by deleting its block.

copyright: "© 2026 Patrick Pistor. All rights reserved."

columns:
  - heading: "Work"
    links:
      - label: "Selected Projects"
        url: "/work/"
      - label: "Open Source"
        url: "https://github.com/patrickpistor"

  - heading: "Writing"
    links:
      - label: "Writing"
        url: "/writing/"
      - label: "RSS Feed"
        url: "/feed.xml"

  - heading: "Connect"
    links:
      - label: "Email"
        url: "mailto:contact@patrickpistor.com"
      - label: "GitHub"
        url: "https://github.com/patrickpistor"
      - label: "LinkedIn"
        url: "https://www.linkedin.com/in/ppistor/"

# ─────────────────────────────────────────────
# NEWSLETTER / EMAIL SIGNUP (optional)
# ─────────────────────────────────────────────
# Set enabled: false to hide this block entirely.
# Two modes:
#   1. Email link (default) — set form_action to a mailto: URL or leave blank
#   2. Form submission      — set form_action to your Formspree/Mailchimp/etc. endpoint
#
# field_label     — label text shown above the email input field
# field_placeholder — placeholder text inside the email input field
# If you only want a CTA button (no email field), set field_label: "" and field_placeholder: ""

newsletter:
  enabled: true
  heading: "Stay in touch"
  description: "Occasional notes on design, development, and what I'm building."
  field_label: "Your email"
  field_placeholder: "you@example.com"
  submit_label: "Subscribe"
  # Set to your Formspree form URL, e.g. https://formspree.io/f/xyzabcde
  # Leave blank to use a mailto: fallback
  form_action: ""
  form_mailto: "contact@patrickpistor.com"
