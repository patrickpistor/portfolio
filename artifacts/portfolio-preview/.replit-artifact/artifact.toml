kind = "web"
previewPath = "/"
title = "Portfolio"
version = "1.0.0"
id = "artifacts/portfolio-preview"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 6000

[services.development]
run = "pnpm --filter @workspace/portfolio-preview run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio-preview", "run", "build" ]
publicDir = "artifacts/portfolio-preview/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "6000"
BASE_PATH = "/"
