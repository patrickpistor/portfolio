<header class="site-header">
  <nav class="nav container">
    <a class="nav__logo" href="{{ '/' | relative_url }}">
      {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" class="nav__logo-img">
      {% else %}
        <span class="nav__logo-text">{{ site.title }}</span>
      {% endif %}
    </a>

    <ul class="nav__links" role="list">
      {% for link in site.nav_links %}
      <li>
        <a href="{{ link.url | relative_url }}" class="nav__link{% if page.url == link.url %} nav__link--active{% endif %}">
          {{ link.label }}
        </a>
      </li>
      {% endfor %}
    </ul>

    <div class="nav__actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>

      {% if site.email %}
      <button
        class="btn btn--pill js-copy-email"
        data-email="{{ site.email }}"
        aria-label="Copy email address"
      >{{ site.contact_label | default: 'Contact' }}</button>
      {% endif %}

      <button class="nav__burger" id="navBurger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
</header>

<script>
  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // Mobile nav
  var burger = document.getElementById('navBurger');
  var navLinks = document.querySelector('.nav__links');
  burger.addEventListener('click', function() {
    var open = navLinks.classList.toggle('nav__links--open');
    burger.setAttribute('aria-expanded', open);
  });

  // Copy email to clipboard — used by the Contact button and all mailto links
  function copyEmailToClipboard(email, el) {
    var origText = el.textContent.trim();
    function flash() {
      el.textContent = 'Copied!';
      setTimeout(function() { el.textContent = origText; }, 2000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(email).then(flash).catch(function() {
        fallbackCopy(email, flash);
      });
    } else {
      fallbackCopy(email, flash);
    }
  }

  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) {}
    document.body.removeChild(ta);
  }

  // Contact button in nav
  document.querySelectorAll('.js-copy-email').forEach(function(btn) {
    btn.addEventListener('click', function() {
      copyEmailToClipboard(btn.dataset.email, btn);
    });
  });

  // All mailto: links (footer "Email", etc.) — copy instead of opening mail client
  document.querySelectorAll('a[href^="mailto:"]').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      var email = link.getAttribute('href').replace(/^mailto:/i, '').split('?')[0];
      copyEmailToClipboard(email, link);
    });
  });
</script>
