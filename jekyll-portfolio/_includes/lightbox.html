<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox__close" id="lightboxClose" aria-label="Close image viewer">&#x2715;</button>
  <img class="lightbox__img" id="lightboxImg" src="" alt="">
</div>

<script>
(function() {
  var lb    = document.getElementById('lightbox');
  var lbImg = document.getElementById('lightboxImg');

  function open(src, alt) {
    lbImg.src = src;
    lbImg.alt = alt || '';
    lb.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('is-open');
    document.body.style.overflow = '';
    setTimeout(function() { lbImg.src = ''; }, 200);
  }

  // Wire up every project image except the full-bleed hero
  document.querySelectorAll(
    '.project img:not(.project-visual__hero-img):not(.nav__logo-img)'
  ).forEach(function(img) {
    img.classList.add('js-lightbox');
    img.addEventListener('click', function() { open(img.src, img.alt); });
  });

  // Close on backdrop click
  lb.addEventListener('click', function(e) {
    if (e.target === lb) close();
  });

  // Close button
  document.getElementById('lightboxClose').addEventListener('click', close);

  // Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && lb.classList.contains('is-open')) close();
  });
})();
</script>
