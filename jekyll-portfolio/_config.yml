# ─────────────────────────────────────────────
# SITE IDENTITY
# ─────────────────────────────────────────────
title: "Your Name"
tagline: "Designer & Developer"
description: "I build thoughtful digital products that live at the intersection of design and engineering."
email: "hello@yoursite.com"
url: "https://yourusername.github.io"
baseurl: ""

# ─────────────────────────────────────────────
# BRANDING
# ─────────────────────────────────────────────

# Accent color — used for links, buttons, tags, and highlights.
# Any valid hex value (include the #).
accent_color: "#0052FF"

# Font pairing — choose one: modern | editorial | mono | classic
# modern    → Inter (clean, professional)
# editorial → Playfair Display + Source Serif 4 (literary, warm)
# mono      → Space Grotesk + JetBrains Mono (technical, distinct)
# classic   → Lora + Open Sans (timeless, readable)
font_pairing: "modern"

# Logo / avatar (optional)
# Path relative to the site root. Leave blank to show your name as text.
logo: ""
avatar: "/assets/images/avatar.jpg"

# ─────────────────────────────────────────────
# NAVIGATION
# ─────────────────────────────────────────────
nav_links:
  - label: "Work"
    url: "/#work"
  - label: "About"
    url: "/about/"
  - label: "Resume"
    url: "/assets/resume.pdf"
# Writing / Substack link is added automatically to the nav when
# substack.username is set below. Label is controlled by substack.nav_label.

contact_label: "Contact"
contact_url: "mailto:hello@yoursite.com"

# ─────────────────────────────────────────────
# HOME PAGE
# ─────────────────────────────────────────────
hero_greeting: "Hi there!"
hero_intro: "I'm a designer & developer crafting thoughtful digital experiences. Currently open to new opportunities."
hero_cta_label: "View my work"
hero_cta_url: "/#work"

# ─────────────────────────────────────────────
# ABOUT PAGE
# ─────────────────────────────────────────────
about_bio: |
  I'm a designer and developer based in [City]. I've spent the last 5 years building products for startups and established brands — from brand identity systems to full-stack web applications.

  I care deeply about the craft: clean code, considered typography, and interfaces that feel inevitable. When I'm not at the computer, I'm usually hiking, reading, or making espresso I can't stop thinking about.

skills:
  - UI/UX Design
  - Brand Identity
  - Front-End Development
  - Motion Design
  - Design Systems
  - Typography

# Social links — shown as icons in the footer.
# Add, remove, or reorder entries freely.
# Available icons: github, x, linkedin, dribbble, instagram, behance, codepen, youtube
# To add a new one, just add an entry with the matching icon name and your URL.
social_links:
  - label: "GitHub"
    url: "https://github.com/yourusername"
    icon: "github"
  - label: "Twitter / X"
    url: "https://x.com/yourusername"
    icon: "x"
  - label: "LinkedIn"
    url: "https://linkedin.com/in/yourusername"
    icon: "linkedin"
  - label: "Dribbble"
    url: "https://dribbble.com/yourusername"
    icon: "dribbble"
  # - label: "CodePen"
  #   url: "https://codepen.io/yourusername"
  #   icon: "codepen"
  # - label: "Instagram"
  #   url: "https://instagram.com/yourusername"
  #   icon: "instagram"
  # - label: "Behance"
  #   url: "https://behance.net/yourusername"
  #   icon: "behance"
  # - label: "YouTube"
  #   url: "https://youtube.com/@yourusername"
  #   icon: "youtube"

# ─────────────────────────────────────────────
# SUBSTACK (optional)
# ─────────────────────────────────────────────
# Set your Substack username to enable Substack integration.
# The /blog/ page will show your Substack subscribe widget and a
# link to your publication instead of the built-in Jekyll post list.
# The footer newsletter form will also submit directly to Substack.
# Leave username blank to use the built-in Jekyll blog instead.
substack:
  username: ""           # e.g. "yourname"  →  yourname.substack.com
  nav_label: "Writing"   # Label shown in nav and page heading

# ─────────────────────────────────────────────
# JEKYLL SETTINGS
# ─────────────────────────────────────────────
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

collections:
  projects:
    output: true
    permalink: /work/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project-mixed"

permalink: /blog/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - README.md
