# ─────────────────────────────────────────────
# PROJECTS
# ─────────────────────────────────────────────
# Each project appears as a card on the home page.
#
# Fields:
#   title       — project name
#   category    — short tag shown on the card (e.g. "Brand Identity", "Web App")
#   description — 1–2 sentence summary shown on the card
#   cover       — path to cover image (relative to site root)
#   url         — where clicking the card goes (internal page or external link)
#   layout_hint — visual | text | mixed  (controls card style on the home grid)
#                 visual: image-dominant card, thin overlay text
#                 text:   text-dominant card, muted background, no image
#                 mixed:  standard card with image above and text below (default)
#   featured    — true to show larger on the home grid (first featured item)
#   year        — displayed on hover / project page

